<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>肖像チェック — 歴史タイピング900名</title>
<style>
  :root{--ink:#211a12;--sub:#6d6455;--line:#ded4c2;--paper:#f6f3ec;--card:#fffdf8;
        --gold:#b8892f;--ok:#2f8f57;--okbg:#e8f5ec;--ng:#c8402e;--ngbg:#fbe9e6;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  /* ヘッダー(固定) */
  header{position:static;background:var(--paper);
    border-bottom:1px solid var(--line);padding:.7em min(4vw,26px)}
  .h-top{display:flex;align-items:baseline;gap:.8em;flex-wrap:wrap}
  .h-top h1{font-size:min(4.4vw,20px);margin:0;letter-spacing:.06em}
  .h-top .src{font-size:12px;color:var(--sub)}
  .stats{display:flex;gap:.5em;flex-wrap:wrap;margin:.55em 0 .15em;font-size:13px}
  .pill{padding:.2em .7em;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--sub)}
  .pill b{color:var(--ink);font-weight:700}
  .pill.ok{color:var(--ok);border-color:#bfe3cc}.pill.ok b{color:var(--ok)}
  .pill.ng{color:var(--ng);border-color:#eec6bf}.pill.ng b{color:var(--ng)}
  .pill.adj{color:#2f6ecf;border-color:#bcd0ee}.pill.adj b{color:#2f6ecf}
  .act.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .bar{height:7px;border-radius:5px;background:#e7ddca;overflow:hidden;margin:.5em 0 .1em}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#c9a34a,#e6c46a);transition:width .3s}
  .controls{display:flex;gap:.5em;align-items:center;flex-wrap:wrap;margin-top:.55em}
  .filters{display:flex;gap:.3em}
  .filters button,.act{font-family:inherit;font-size:13px;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:var(--ink);border-radius:6px;padding:.4em .8em}
  .filters button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .act{background:#fff}
  .act.primary{background:var(--gold);color:#fff;border-color:var(--gold)}
  input.search{font-family:inherit;font-size:13px;padding:.42em .7em;border:1px solid var(--line);border-radius:6px;background:#fff;min-width:150px}
  .spacer{flex:1}
  /* グリッド */
  main{padding:min(4vw,22px);max-width:1400px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(46vw,240px),1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:box-shadow .15s}
  .card.ok{border-color:#96cfab;background:var(--okbg)}
  .card.ng{border-color:#e5a89d;background:var(--ngbg)}
  /* ゲームと同じくり抜き窓: hole 584:541(≒1.08:1) / cover / 既定 上6% */
  .imgwrap{position:relative;width:100%;padding-top:92.64%;background:#efe9dc;cursor:zoom-in;overflow:hidden}
  .imgwrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 6%}
  /* 中央ガイド(顔を真ん中に合わせる用) */
  .imgwrap::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .15s;
    background:linear-gradient(transparent calc(50% - 1px),rgba(255,70,70,.55) calc(50% - 1px) calc(50% + 1px),transparent calc(50% + 1px)),
      linear-gradient(90deg,transparent calc(50% - 1px),rgba(255,70,70,.55) calc(50% - 1px) calc(50% + 1px),transparent calc(50% + 1px))}
  body.guides .imgwrap::after{opacity:1}
  /* 顔位置の微調整コントロール */
  .nudge{display:flex;gap:3px;justify-content:center;align-items:center;padding:5px 4px 0;flex-wrap:wrap}
  .nudge button{width:27px;height:22px;font-size:12px;line-height:1;border:1px solid var(--line);background:#fff;
    border-radius:5px;cursor:pointer;color:var(--ink);font-family:inherit;padding:0}
  .nudge button:hover{background:#f0ead9}
  .nudge .reset{width:auto;padding:0 6px;font-size:11px;color:#7a6f56}
  .card.posadj .imgwrap{box-shadow:inset 0 0 0 2px #2f6ecf}
  /* 難易度の編集 */
  .diffrow{display:flex;gap:4px;align-items:center;margin-top:.45em;flex-wrap:wrap}
  .diffrow .dlabel{font-size:11px;color:#7a6f56}
  .diffrow button{width:24px;height:23px;border:1px solid var(--line);background:#fff;border-radius:5px;
    cursor:pointer;font-family:inherit;font-size:12px;color:var(--ink);padding:0}
  .diffrow button:hover{background:#f0ead9}
  .diffrow button.cur{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:700}
  .diffrow .dchg{font-size:10px;color:#2f6ecf;font-weight:700;margin-left:.2em}
  .card.diffchg .diffrow .dlabel{color:#2f6ecf;font-weight:700}
  .imgwrap .no{position:absolute;top:6px;left:6px;background:rgba(33,26,18,.72);color:#fff;font-size:11px;
    padding:.1em .5em;border-radius:4px;letter-spacing:.04em}
  .imgwrap .chgtag{position:absolute;top:6px;left:52px;background:#2f6ecf;color:#fff;font-size:11px;font-weight:700;
    padding:.1em .5em;border-radius:4px;letter-spacing:.06em}
  .imgwrap .badge{position:absolute;top:6px;right:6px;font-size:12px;font-weight:700;padding:.15em .55em;border-radius:4px;display:none}
  .card.ok .badge{display:block;background:var(--ok);color:#fff}
  .card.ng .badge{display:block;background:var(--ng);color:#fff}
  /* 掲載不可(顔の肖像が存在せず出題から除外した人物) */
  .card.unpub{border-color:#a01e12;background:#fbeae7}
  .imgwrap .nopub{position:absolute;left:0;right:0;bottom:0;background:rgba(150,26,15,.92);color:#fff;
    font-size:13px;font-weight:700;text-align:center;padding:.35em 0;letter-spacing:.14em}
  .card.unpub .imgwrap img{filter:grayscale(.35) opacity(.82)}
  .body{padding:.55em .7em .3em;flex:1}
  .name{font-size:min(4.6vw,18px);font-weight:700;line-height:1.2}
  .yomi{font-size:12px;color:var(--sub);margin-top:.1em}
  .meta{font-size:11px;color:var(--gold);margin-top:.25em;letter-spacing:.02em}
  .bio{font-size:11.5px;color:#5b5344;margin-top:.35em;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .src{margin-top:.45em;font-size:11px;display:flex;align-items:center;gap:.5em;flex-wrap:wrap}
  .src a{color:#3a63b8;text-decoration:none}
  .src a:hover{text-decoration:underline}
  .src .lic{color:var(--sub);background:#efe9dc;border-radius:4px;padding:.05em .5em;font-size:10.5px}
  .btns{display:flex;border-top:1px solid var(--line)}
  .btns button{flex:1;font-family:inherit;font-size:14px;cursor:pointer;border:none;background:transparent;
    padding:.6em 0;color:var(--sub);font-weight:700;letter-spacing:.08em}
  .btns button:not(:only-child):first-child{border-right:1px solid var(--line)}
  .btns .b-ok:hover{background:var(--okbg);color:var(--ok)}
  .btns .b-ng:hover{background:var(--ngbg);color:var(--ng)}
  .card.ok .b-ok{background:var(--ok);color:#fff}
  .card.ng .b-ng{background:var(--ng);color:#fff}
  .empty{text-align:center;color:var(--sub);padding:4em 1em;font-size:14px}
  footer{text-align:center;color:var(--sub);font-size:12px;padding:2em 1em 3em}
  /* 拡大表示 */
  #zoom{position:fixed;inset:0;z-index:50;background:rgba(20,16,10,.9);display:none;align-items:center;justify-content:center;cursor:zoom-out;padding:3vh}
  #zoom img{max-width:94vw;max-height:80vh;object-fit:contain;background:#fff;border-radius:6px}
  #zoom .zcap{position:absolute;bottom:4vh;left:0;right:0;text-align:center;color:#fff;font-size:15px}
  #zoom .zcap small{color:#d8c9a0;display:block;margin-top:.2em}
</style>

url":"https://upload.wikimedia.org/wikipedia/commons/8/80/%E6%B5%AE%E4%B8%96%E7%B5%B5%E6%98%8E%E6%B2%BB%E6%99%82%E4%BB%A3%E3%81%AE%E9%A6%AC%E8%BB%8A.jpg","lic":"Public Domain","unpub":1,"no":898},{"id":"jhtg-1167","k":"伊藤一刀斎","h":"いとういっとうさい","r":"ito ittosai","era":"戦国時代・江戸時代","diff":2,"bio":"一刀流の祖。生涯の実戦不敗と伝わる伝説的剣豪。高弟小野忠明を通じ徳川将軍家御流儀となる。","url":"https://upload.wikimedia.org/wikipedia/commons/e/eb/Itou_Ittousai.jpg","lic":"Public Domain","no":899}];</script>

<body>
<header>
  <div class="h-top"><h1>肖像チェック</h1><span class="src">歴史タイピング／実際の出題と同じくり抜きで表示・矢印で顔位置を調整</span></div>
  <div class="stats">
    <span class="pill">全 <b id="sTotal">0</b></span>
    <span class="pill ng">要修正 <b id="sNg">0</b></span>
    <span class="pill" style="border-color:#a01e12;color:#a01e12">掲載不可 <b id="sUnpub">0</b></span>
    <span class="pill">未確認 <b id="sTodo">0</b></span>
    <span class="pill adj">位置調整 <b id="sAdj">0</b></span>
    <span class="pill" style="border-color:#2f6ecf;color:#2f6ecf">難易度変更 <b id="sDiff">0</b></span>
  </div>
  <div class="controls">
    <div class="filters" id="filters">
      <button data-f="all" class="on">すべて</button>
      <button data-f="todo">未確認</button>
      <button data-f="ng">要修正</button>
      <button data-f="unpub">掲載不可</button>
      <button data-f="chg">差し替え済</button>
      <button data-f="adj">位置調整済</button>
    </div>
    <select class="act" id="diffFilter" title="難易度で絞り込み">
      <option value="all">難易度：すべて</option>
      <option value="1">難1</option>
      <option value="2">難2</option>
      <option value="3">難3</option>
      <option value="4">難4</option>
      <option value="5">難5</option>
    </select>
    <input class="search" id="search" placeholder="名前・よみで検索">
    <span class="spacer"></span>
    <button class="act" id="guideBtn">中央ガイド</button>
    <button class="act" id="jumpTodo">未確認へ</button>
    <button class="act primary" id="export">結果CSV</button>
    <button class="act" id="exportPos">顔位置JSON</button>
    <button class="act" id="exportDiff">難易度JSON</button>
    <button class="act" id="reset">リセット</button>
  </div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">該当なし</div>
</main>
<footer>判定は自動保存されます（この端末のブラウザに記録）。「結果を書き出す」でCSVに出力できます。</footer>

<div id="zoom"><img id="zoomImg" alt=""><div class="zcap" id="zoomCap"></div></div>

<script>
const KEY='jhtg.imgcheck';
const POSKEY='jhtg.imgpos';                 // 顔位置調整 {id:[x,y,zoom]}
const DIFFKEY='jhtg.diff';                  // 難易度の変更 {id:新難易度(1-5)}
const DEFX=50, DEFY=6, DEFZ=1, STEP=3, ZSTEP=0.1;   // 既定=横中央・上6%・等倍(ゲームと同じ)
let DATA=[], status={}, pos={}, diffov={}, filter='all', diffF='all', q='';
const $=s=>document.querySelector(s);
function loadDiff(){ try{diffov=JSON.parse(localStorage.getItem(DIFFKEY)||'{}');}catch(e){diffov={};} }
function saveDiff(){ try{localStorage.setItem(DIFFKEY,JSON.stringify(diffov));}catch(e){} }
function effDiff(d){ const v=diffov[d.id]; return (v!=null)?v:d.diff; }  // 実効難易度(変更があれば優先)
function setDiff(id,v){
  const d=DATA.find(x=>x.id===id); if(!d)return;
  if(v===d.diff) delete diffov[id]; else diffov[id]=v;   // 元に戻したら記録削除
  saveDiff();
  const card=document.querySelector('.card[data-id="'+id+'"]');
  if(card){
    const eff=effDiff(d), chg=(diffov[id]!=null);
    card.classList.toggle('diffchg',chg);
    card.querySelector('.meta').innerHTML=d.era+'　難'+eff+(chg?' <span class="dchg">(変更)</span>':'')+'　'+d.id;
    card.querySelectorAll('.diffrow button').forEach(b=>b.classList.toggle('cur',+b.dataset.diffv===eff));
  }
  renderStats();
}

// 画像URL(upload.wikimedia)から Commons ファイルページを導く
function commonsUrl(u){
  try{ u=String(u).split('?')[0]; const p=u.split('/');
    const ti=p.indexOf('thumb');
    const file=ti>=0 ? p[p.length-2] : p[p.length-1];   // /thumb/a/ab/Name.jpg/500px-... 対応
    if(u.indexOf('wikimedia.org')<0) return u;           // Wikimedia以外はそのまま
    return 'https://commons.wikimedia.org/wiki/File:'+file;
  }catch(e){ return u; }
}
function load(){ try{status=JSON.parse(localStorage.getItem(KEY)||'{}');}catch(e){status={};} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(status));}catch(e){} }
function loadPos(){ try{pos=JSON.parse(localStorage.getItem(POSKEY)||'{}');}catch(e){pos={};} }
function savePos(){ try{localStorage.setItem(POSKEY,JSON.stringify(pos));}catch(e){} }
function getPos(id){ const p=pos[id]; return p?[p[0],p[1],p[2]!=null?p[2]:DEFZ]:[DEFX,DEFY,DEFZ]; }
function nudge(id,dir){
  let [x,y,z]=getPos(id);
  if(dir==='up')   y=Math.max(0,y-STEP);
  else if(dir==='down') y=Math.min(100,y+STEP);
  else if(dir==='left') x=Math.max(0,x-STEP);
  else if(dir==='right')x=Math.min(100,x+STEP);
  else if(dir==='zoomin')  z=Math.min(3, Math.round((z+ZSTEP)*100)/100);
  else if(dir==='zoomout') z=Math.max(0.5, Math.round((z-ZSTEP)*100)/100);
  else if(dir==='reset'){ x=DEFX;y=DEFY;z=DEFZ; }
  if(x===DEFX&&y===DEFY&&z===DEFZ) delete pos[id]; else pos[id]=[x,y,z];
  savePos();
  const card=document.querySelector('.card[data-id="'+id+'"]');
  if(card){ const img=card.querySelector('.imgwrap img');
    if(img){ img.style.objectPosition=x+'% '+y+'%'; img.style.transform='scale('+z+')'; img.style.transformOrigin=x+'% '+y+'%'; }
    card.classList.toggle('posadj', !!pos[id]); }
  renderStats();
}

function counts(){
  let ok=0,ng=0; for(const d of DATA){const s=status[d.id]; if(s==='ok')ok++; else if(s==='ng')ng++;}
  return {ok,ng,done:ok+ng,total:DATA.length,todo:DATA.length-ok-ng};
}
function renderStats(){
  const c=counts();
  $('#sNg').textContent=c.ng;
  $('#sUnpub').textContent=DATA.filter(d=>d.unpub).length;
  $('#sDiff').textContent=Object.keys(diffov).length;
  $('#sTotal').textContent=c.total; $('#sTodo').textContent=c.todo;
  $('#sAdj').textContent=Object.keys(pos).length;
}
function visible(){
  return DATA.filter(d=>{
    const s=status[d.id]||'todo';
    if(filter==='ok'&&s!=='ok')return false;
    if(filter==='ng'&&s!=='ng')return false;
    if(filter==='todo'&&(s==='ok'||s==='ng'))return false;
    if(filter==='chg'&&!d.chg)return false;
    if(filter==='unpub'&&!d.unpub)return false;
    if(filter==='adj'&&!pos[d.id])return false;
    if(diffF!=='all'&&effDiff(d)!==+diffF)return false;
    if(q){const hay=(d.k+' '+d.h+' '+d.era).toLowerCase(); if(!hay.includes(q))return false;}
    return true;
  });
}
function imgStyle(p){ return 'object-position:'+p[0]+'% '+p[1]+'%;transform:scale('+p[2]+');transform-origin:'+p[0]+'% '+p[1]+'%'; }
function cardHTML(d){
  const s=status[d.id]||'';
  const adj=!!pos[d.id]; const p=getPos(d.id);
  return '<div class="card '+s+(adj?' posadj':'')+(d.unpub?' unpub':'')+(diffov[d.id]!=null?' diffchg':'')+'" data-id="'+d.id+'">'+
    '<div class="imgwrap" data-zoom="'+d.id+'">'+
      '<span class="no">No.'+d.no+'</span>'+
      (d.chg?'<span class="chgtag">差替</span>':'')+
      '<span class="badge">'+(s==='ng'?'要修正':'')+'</span>'+
      (d.unpub?'<span class="nopub">掲載不可（肖像なし）</span>':'')+
      '<img loading="lazy" src="'+d.url+'" alt="" referrerpolicy="no-referrer" '+
        'style="'+imgStyle(p)+'" '+
        'onerror="this.style.display=\'none\';this.parentNode.insertAdjacentHTML(\'beforeend\',\'<span style=&quot;color:#b7361f;font-size:12px&quot;>画像読み込み失敗</span>\')">'+
    '</div>'+
    '<div class="nudge">'+
      '<button data-nud="up" data-id="'+d.id+'" title="上へ">↑</button>'+
      '<button data-nud="down" data-id="'+d.id+'" title="下へ">↓</button>'+
      '<button data-nud="left" data-id="'+d.id+'" title="左へ">←</button>'+
      '<button data-nud="right" data-id="'+d.id+'" title="右へ">→</button>'+
      '<button data-nud="zoomin" data-id="'+d.id+'" title="ズームイン">＋</button>'+
      '<button data-nud="zoomout" data-id="'+d.id+'" title="ズームアウト">－</button>'+
      '<button class="reset" data-nud="reset" data-id="'+d.id+'" title="既定に戻す">既定</button>'+
    '</div>'+
    '<div class="body">'+
      '<div class="name">'+d.k+'</div>'+
      '<div class="yomi">'+d.h+'</div>'+
      '<div class="meta">'+d.era+'　難'+effDiff(d)+(diffov[d.id]!=null?' <span class="dchg">(変更)</span>':'')+'　'+d.id+'</div>'+
      '<div class="diffrow"><span class="dlabel">難易度</span>'+
        [1,2,3,4,5].map(v=>'<button data-diffv="'+v+'" data-id="'+d.id+'"'+(effDiff(d)===v?' class="cur"':'')+'>'+v+'</button>').join('')+
      '</div>'+
      '<div class="bio">'+(d.bio||'')+'</div>'+
      '<div class="src"><a href="'+commonsUrl(d.url)+'" target="_blank" rel="noopener">出典を見る（Wikimedia）↗</a>'+
        (d.lic?'<span class="lic">'+d.lic+'</span>':'')+'</div>'+
    '</div>'+
    '<div class="btns">'+
      '<button class="b-ng" data-set="ng" data-id="'+d.id+'">✕ 要修正</button>'+
    '</div>'+
  '</div>';
}
function render(){
  const list=visible();
  $('#grid').innerHTML=list.map(cardHTML).join('');
  $('#empty').style.display=list.length?'none':'block';
  document.querySelectorAll('#filters button').forEach(b=>b.classList.toggle('on',b.dataset.f===filter));
}
function setStatus(id,val){
  if(status[id]===val) delete status[id];   // もう一度押すと取り消し
  else status[id]=val;
  save(); renderStats();
  const card=document.querySelector('.card[data-id="'+id+'"]');
  if(card){
    const s=status[id]||'';
    card.className='card '+s;
    const badge=card.querySelector('.badge'); badge.textContent=s==='ok'?'一致':s==='ng'?'不一致':'';
    // 未確認フィルタ中に確定したら一覧から消す
    if(filter!=='all'){ const s2=status[id]||'todo';
      const keep=(filter==='ok'&&s2==='ok')||(filter==='ng'&&s2==='ng')||(filter==='todo'&&s2==='todo');
      if(!keep) card.remove();
      if(!$('#grid').children.length) $('#empty').style.display='block';
    }
  }
}
function openZoom(id){
  const d=DATA.find(x=>x.id===id); if(!d)return;
  $('#zoomImg').src=d.url;
  $('#zoomCap').innerHTML=d.k+' <small>'+d.h+'　/　'+d.era+'　/　No.'+d.no+'　'+d.id+'</small>';
  $('#zoom').style.display='flex';
}
function exportCSV(){
  const head=['No','id','名前(漢字)','よみ','時代','難易度','要修正','顔位置','ズーム','画像URL','出典(Wikimedia)','ライセンス'];
  const rows=[head];
  for(const d of DATA){ const s=status[d.id]; const p=getPos(d.id);
    rows.push([d.no,d.id,d.k,d.h,d.era,d.diff,(s==='ng'?'要修正':''),p[0]+'% '+p[1]+'%',p[2],d.url,commonsUrl(d.url),d.lic||'']); }
  const csv=rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='肖像チェック結果.csv'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

// 配線
document.addEventListener('click',e=>{
  const nud=e.target.closest('[data-nud]'); if(nud){ nudge(nud.dataset.id,nud.dataset.nud); return; }
  const dv=e.target.closest('[data-diffv]'); if(dv){ setDiff(dv.dataset.id,+dv.dataset.diffv); return; }
  const set=e.target.closest('[data-set]'); if(set){ setStatus(set.dataset.id,set.dataset.set); return; }
  const z=e.target.closest('[data-zoom]'); if(z){ openZoom(z.dataset.zoom); return; }
  const f=e.target.closest('#filters button'); if(f){ filter=f.dataset.f; render(); return; }
});
$('#zoom').addEventListener('click',()=>{$('#zoom').style.display='none';$('#zoomImg').src='';});
$('#search').addEventListener('input',e=>{ q=e.target.value.trim().toLowerCase(); render(); });
$('#diffFilter').addEventListener('change',e=>{ diffF=e.target.value; render(); });
$('#export').addEventListener('click',exportCSV);
$('#exportPos').addEventListener('click',exportPos);
$('#exportDiff').addEventListener('click',exportDiff);
$('#guideBtn').addEventListener('click',()=>{ document.body.classList.toggle('guides');
  $('#guideBtn').classList.toggle('on'); });
$('#jumpTodo').addEventListener('click',()=>{ filter='todo'; render(); window.scrollTo({top:0,behavior:'smooth'}); });
$('#reset').addEventListener('click',()=>{ if(confirm('すべての判定を消しますか？（CSVに書き出していないと戻せません）')){ status={}; save(); renderStats(); render(); }});

// 顔位置データの書き出し（調整したものだけ id -> "x% y%"）
function exportPos(){
  const obj={}; for(const id in pos){ const p=getPos(id); obj[id]={pos:p[0]+'% '+p[1]+'%', scale:p[2]}; }
  const blob=new Blob([JSON.stringify(obj,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='顔位置調整.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

// 難易度の変更を書き出し（変更したものだけ id -> {旧,新}）
function exportDiff(){
  const obj={}; for(const id in diffov){ const d=DATA.find(x=>x.id===id); obj[id]={old:d?d.diff:null, new:diffov[id]}; }
  const blob=new Blob([JSON.stringify(obj,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='難易度変更.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

// 起動（埋め込みデータがあればそれを使う＝サーバー不要。無ければ同階層のJSONを取得）
(window.__DATA__ ? Promise.resolve(window.__DATA__) : fetch('check-data.json').then(r=>r.json()))
  .then(d=>{ DATA=d; load(); loadPos(); loadDiff(); renderStats(); render(); })
  .catch(e=>{ $('#grid').innerHTML='<div class="empty">データ読み込み失敗: '+e+'</div>'; });
</script>
</body>
</html>
